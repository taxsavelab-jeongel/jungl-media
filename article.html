<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가업승계저널</title>
<meta name="description" content="가업승계·절세·지배구조를 깊이 있게 다루는 중소기업 오너 전문 신문 가업승계저널">
<meta property="og:title" content="가업승계저널 - 중소기업 오너를 위한 전문 신문">
<meta property="og:description" content="가업승계·절세·지배구조를 깊이 있게 다루는 중소기업 오너 전문 신문 가업승계저널">
<meta property="og:type" content="article">
<meta property="og:site_name" content="가업승계저널">
<meta property="og:image" content="https://zininxukaybakogyflfq.supabase.co/storage/v1/object/public/article-images/og-default.jpg">
<meta property="og:image:width" content="800">
<meta property="og:image:height" content="420">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="가업승계저널 - 중소기업 오너를 위한 전문 신문">
<meta name="twitter:description" content="가업승계·절세·지배구조를 깊이 있게 다루는 중소기업 오너 전문 신문 가업승계저널">
<meta name="twitter:image" content="https://zininxukaybakogyflfq.supabase.co/storage/v1/object/public/article-images/og-default.jpg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

<div id="site-header"></div>

<div class="article-page" id="article-wrap">
  <p style="color:#98908d">기사를 불러오는 중…</p>
</div>

<footer id="site-footer"></footer>

<script src="common.js"></script>
<script>
(async function () {
  const J = window.JUNGL, C = window.JUNGL_CONFIG;
  J.renderFooter();

  const id = new URLSearchParams(location.search).get("id");
  const a = await J.fetchArticle(id);
  J.renderHeader(a ? a.channel_slug : "");

  const wrap = document.getElementById("article-wrap");
  if (!a) { wrap.innerHTML = "<p>기사를 찾을 수 없습니다.</p>"; return; }

  document.title = a.title + " - 가업승계저널";

  // 실제 방문자 브라우저(공유 시트 등)를 위해 메타 태그도 기사 내용에 맞게 갱신.
  // 카카오톡·페이스북 등 링크 공유 미리보기는 JS를 실행하지 않고 위 <head>의 기본값을
  // 그대로 읽어가므로(og-default.jpg + 공용 설명), 기사별 정확한 미리보기가 꼭 필요하면
  // /a/{기사ID}.html 정적 페이지 링크를 공유해 주세요.
  const setMeta = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };
  const descText = (a.lede || a.title).slice(0, 140);
  setMeta('meta[name="description"]', "content", descText);
  setMeta('meta[property="og:title"]', "content", a.title);
  setMeta('meta[property="og:description"]', "content", descText);
  setMeta('meta[name="twitter:title"]', "content", a.title);
  setMeta('meta[name="twitter:description"]', "content", descText);
  if (a.thumbnail_url) {
    setMeta('meta[property="og:image"]', "content", a.thumbnail_url);
    setMeta('meta[name="twitter:image"]', "content", a.thumbnail_url);
  }

  const media = a.youtube_id
    ? `<div class="video"><iframe src="https://www.youtube.com/embed/${a.youtube_id}" allowfullscreen title="${a.title}"></iframe></div>`
    : (a.thumbnail_url ? `<img class="hero-img" src="${a.thumbnail_url}" alt="">` : "");

  wrap.innerHTML = `
    <span class="cat">${J.chName(a.channel_slug)}</span>
    <h1>${a.title}</h1>
    ${a.lede ? `<div class="lede">${a.lede}</div>` : ""}
    <div class="byline">
      <span>${a.author || "정엘 편집국"} · ${J.fmtDate(a.published_at)}</span>
      <span>조회 ${(a.views||0).toLocaleString()}</span>
    </div>
    ${media}
    <div class="article-body">${a.content || ""}</div>
    <div class="article-footer">
      <b>가업승계저널</b> — 가업승계 그 이상, 100년 기업의 이야기를 잇는 경제신문<br>
      본 기사 내용은 일반적인 정보 제공을 목적으로 하며, 개별 사안에 대한 세무·법률 자문이 아닙니다.
      구체적인 사안은 반드시 전문가와 상담하시기 바랍니다. 무단 전재·복사·배포 금지.
    </div>`;
})();
</script>
</body>
</html>
