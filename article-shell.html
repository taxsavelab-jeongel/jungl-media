<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--ARTICLE-META-->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
.share-btn{background:#fff;border:1px solid var(--gray,#cad0d7);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;color:#3d3833;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s}
.share-btn:hover{background:#f5f0ea;border-color:#b3a89e}
</style>
</head>
<body>

<div id="site-header"></div>

<div class="article-page" id="article-wrap">
  <p style="color:#98908d">기사를 불러오는 중…</p>
</div>

<footer id="site-footer"></footer>

<script src="common.js"></script>
<script>
(async function () {
  const J = window.JUNGL, C = window.JUNGL_CONFIG;
  J.renderFooter();

  const id = new URLSearchParams(location.search).get("id");
  const a = await J.fetchArticle(id);
  J.renderHeader(a ? a.channel_slug : "");

  const wrap = document.getElementById("article-wrap");
  if (!a) { wrap.innerHTML = "<p>기사를 찾을 수 없습니다.</p>"; return; }

  document.title = a.title + " - 가업승계저널";

  // 실제 방문자 브라우저(공유 시트 등)를 위해 메타 태그도 기사 내용에 맞게 갱신.
  // 카카오톡·페이스북 등 링크 공유 미리보기(크롤러)는 서버(/api/article)가 이 기사 데이터로
  // <head>를 미리 렌더링해 내려주므로 정확한 미리보기가 표시됩니다. 아래는 실제로 페이지를
  // 열어본 방문자의 브라우저 상태(주소창 공유 등)를 위한 보조 갱신입니다.
  const setMeta = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };
  const descText = (a.lede || a.title).slice(0, 140);
  setMeta('meta[name="description"]', "content", descText);
  setMeta('meta[property="og:title"]', "content", a.title);
  setMeta('meta[property="og:description"]', "content", descText);
  setMeta('meta[name="twitter:title"]', "content", a.title);
  setMeta('meta[name="twitter:description"]', "content", descText);
  if (a.thumbnail_url) {
    setMeta('meta[property="og:image"]', "content", a.thumbnail_url);
    setMeta('meta[name="twitter:image"]', "content", a.thumbnail_url);
  }

  const media = a.youtube_id
    ? `<div class="video"><iframe src="https://www.youtube.com/embed/${a.youtube_id}" allowfullscreen title="${a.title}"></iframe></div>`
    : (a.thumbnail_url ? `<img class="hero-img" src="${a.thumbnail_url}" alt="">` : "");

  wrap.innerHTML = `
    <span class="cat">${J.chName(a.channel_slug)}</span>
    <h1>${a.title}</h1>
    ${a.lede ? `<div class="lede">${a.lede}</div>` : ""}
    <div class="byline">
      <span>${a.author || "정엘 편집국"} · ${J.fmtDate(a.published_at)} · 조회 ${(a.views||0).toLocaleString()}</span>
      <button type="button" class="share-btn" id="share-btn">🔗 공유하기</button>
    </div>
    ${media}
    <div class="article-body">${a.content || ""}</div>
    <div class="article-footer">
      <b>가업승계저널</b> — 가업승계 그 이상, 100년 기업의 이야기를 잇는 경제신문<br>
      본 기사 내용은 일반적인 정보 제공을 목적으로 하며, 개별 사안에 대한 세무·법률 자문이 아닙니다.
      구체적인 사안은 반드시 전문가와 상담하시기 바랍니다. 무단 전재·복사·배포 금지.
    </div>`;

  const shareBtn = document.getElementById("share-btn");
  if (shareBtn) {
    shareBtn.addEventListener("click", async () => {
      const shareUrl = location.href;
      if (navigator.share) {
        try { await navigator.share({ title: a.title, text: descText, url: shareUrl }); } catch (e) {}
        return;
      }
      try {
        await navigator.clipboard.writeText(shareUrl);
        const orig = shareBtn.textContent;
        shareBtn.textContent = "✅ 링크가 복사되었습니다";
        setTimeout(() => { shareBtn.textContent = orig; }, 2000);
      } catch (e) {
        window.prompt("아래 링크를 복사하세요", shareUrl);
      }
    });
  }
})();
</script>
</body>
</html>
